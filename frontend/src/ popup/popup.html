<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI Code Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    @keyframes wave {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .gradient-bg {
      background: linear-gradient(-45deg, #6366f1, #8b5cf6, #ec4899);
      background-size: 400% 400%;
      animation: wave 15s ease infinite;
    }
  </style>
</head>
<body class="w-[400px] min-h-[500px] bg-gray-900 text-white">
  <div class="gradient-bg p-6">
    <h1 class="text-2xl font-bold flex items-center gap-2">
      <i class="fas fa-robot"></i> Code AI Assistant
    </h1>
  </div>

  <div class="p-6 space-y-4">
    <div class="grid grid-cols-2 gap-4">
      <button id="summarize" class="ai-btn bg-indigo-600 hover:bg-indigo-700">
        <i class="fas fa-comment mr-2"></i>Summarize
      </button>
      <button id="explain" class="ai-btn bg-purple-600 hover:bg-purple-700">
        <i class="fas fa-lightbulb mr-2"></i>Explain
      </button>
      <button id="debug" class="ai-btn bg-pink-600 hover:bg-pink-700">
        <i class="fas fa-bug mr-2"></i>Debug
      </button>
      <button id="optimize" class="ai-btn bg-teal-600 hover:bg-teal-700">
        <i class="fas fa-bolt mr-2"></i>Optimize
      </button>
    </div>

    <div class="bg-gray-800 rounded-lg p-4 min-h-[200px]">
      <div id="result" class="prose prose-invert max-h-[300px] overflow-y-auto"></div>
      <div id="loading" class="hidden text-center py-4">
        <div class="dot-flashing mx-auto"></div>
      </div>
    </div>

    <div class="flex justify-between items-center text-sm text-gray-400">
      <button id="copy" class="hover:text-white">
        <i class="far fa-copy mr-1"></i>Copy
      </button>
      <div class="flex items-center gap-2">
        <i class="fas fa-database"></i>
        <select id="aiModel" class="bg-gray-800 px-2 py-1 rounded">
          <option value="gemini">Gemini</option>
          <option value="gpt">GPT-3.5</option>
        </select>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
