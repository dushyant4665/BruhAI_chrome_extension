<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>BruhAI</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="title">🦾 Code Assistant</h1>
      <button id="settings" class="settings-btn">⚙️</button>
    </header>

    <div class="input-section">
      <textarea id="input" placeholder="Select code/text on page or paste here..."></textarea>
      <div class="action-buttons">
        <button data-action="summarize" class="btn purple">Summarize</button>
        <button data-action="explain" class="btn blue">Explain</button>
        <button data-action="debug" class="btn red">Debug</button>
        <button data-action="optimize" class="btn green">Optimize</button>
      </div>
    </div>

    <div class="result-section">
      <div class="result-header">
        <h3>AI Response</h3>
        <button id="copy" class="icon-btn">📋</button>
      </div>
      <div id="result" class="result-content"></div>
      <div id="loading" class="loader hidden"></div>
    </div>

    <div class="history-section">
      <div class="history-header">
        <h3>History</h3>
        <button id="clear-history" class="text-btn">Clear All</button>
      </div>
      <div id="history" class="history-items"></div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
